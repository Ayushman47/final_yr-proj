<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Medications</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  background: #16a34a;
  padding: 18px 40px;
  display: flex;
  justify-content: space-between;
}

.container {
  max-width: 900px;
  margin: 50px auto;
  padding: 30px;
  background: #1f2937;
  border-radius: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: 1px solid #334155;
  background: #111827;
  color: white;
}

button {
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 600;
}

.primary-btn {
  background: #22c55e;
  width: 100%;
  margin-bottom: 20px;
}

.med-card {
  background: #111827;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

.delete-btn {
  background: #ef4444;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>
  <div>💊 Medical Assistant</div>
  <div><a href="/index" style="color:white;text-decoration:none;">Chat</a></div>
</header>

<div class="container">

  <!-- ✅ NEW HEALTH PROFILE SECTION -->
  <h2>Health Profile</h2>

  <input id="allergies" type="text" placeholder="Allergies (e.g., Penicillin)">
  <input id="conditions" type="text" placeholder="Medical Conditions (e.g., Asthma)">
  <input id="age" type="number" placeholder="Age">

  <button class="primary-btn" onclick="saveProfile()">Save Profile</button>

  <!-- EXISTING MEDICATION SECTION (UNCHANGED) -->
  <h2>Add Medication</h2>

  <input id="name" type="text" placeholder="Medication Name">
  <input id="dosage" type="text" placeholder="Dosage">
  <input id="frequency" type="text" placeholder="Frequency">

  <button class="primary-btn" onclick="addMedication()">Save Medication</button>

  <h2>My Medications</h2>

  <div id="medList"></div>

</div>

<script>

 

    const API_BASE = "http://127.0.0.1:8000";
    
    const token = localStorage.getItem("token");
    
    if (!token || token === "undefined" || token === "null") {
        localStorage.removeItem("token");
        window.location.href = "/";
    }
    
    // ---------------- SAVE PROFILE ----------------
    async function saveProfile() {
    
        const allergies = document.getElementById("allergies").value;
        const conditions = document.getElementById("conditions").value;
        const age = document.getElementById("age").value;
    
        await fetch(`${API_BASE}/update-profile`, {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                allergies,
                conditions,
                age: age ? parseInt(age) : null
            })
        });
    
        alert("Health profile saved successfully!");
    }
    
    // ---------------- LOAD PROFILE ----------------
    async function loadProfile() {
    
        const response = await fetch(`${API_BASE}/profile`, {
            headers: {
                "Authorization": "Bearer " + token
            }
        });
    
        if (!response.ok) return;
    
        const data = await response.json();
    
        document.getElementById("allergies").value = data.allergies || "";
        document.getElementById("conditions").value = data.conditions || "";
        document.getElementById("age").value = data.age || "";
    }
    
    // ---------------- ADD MEDICATION ----------------
    async function addMedication() {
    
        const name = document.getElementById("name").value;
        const dosage = document.getElementById("dosage").value;
        const frequency = document.getElementById("frequency").value;
    
        if (!name || !dosage || !frequency) return;
    
        await fetch(`${API_BASE}/add-medication`, {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ name, dosage, frequency })
        });
    
        document.getElementById("name").value = "";
        document.getElementById("dosage").value = "";
        document.getElementById("frequency").value = "";
    
        loadMedications();
    }
    
    // ---------------- LOAD MEDICATIONS ----------------
    async function loadMedications() {
    
        const response = await fetch(`${API_BASE}/medications`, {
            headers: {
                "Authorization": "Bearer " + token
            }
        });
    
        if (!response.ok) return;
    
        const data = await response.json();
    
        const list = document.getElementById("medList");
        list.innerHTML = "";
    
        data.medications.forEach(med => {
            list.innerHTML += `
                <div class="med-card">
                    <strong>${med.name}</strong><br>
                    Dosage: ${med.dosage}<br>
                    Frequency: ${med.frequency}<br>
                    <button class="delete-btn" onclick="deleteMedication('${med.name}')">Delete</button>
                </div>
            `;
        });
    }
    
    // ---------------- DELETE ----------------
    async function deleteMedication(name) {
    
        await fetch(`${API_BASE}/medication/${name}`, {
            method: "DELETE",
            headers: {
                "Authorization": "Bearer " + token
            }
        });
    
        loadMedications();
    }
    
    // Load everything
    loadProfile();
    loadMedications();
    
    
</script>

</body>
</html>
