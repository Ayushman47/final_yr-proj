<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Health Dashboard | Health Assist</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --primary-green: #22c55e;
        --dark-green: #1b5e20;
        --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        --card-bg: rgba(30, 41, 59, 0.7);
        --input-bg: rgba(15, 23, 42, 0.8);
        --text-muted: #94a3b8;
        --border-color: rgba(51, 65, 85, 0.5);
    }

    body {
        font-family: 'Inter', sans-serif;
        background: var(--bg-gradient);
        background-attachment: fixed;
        color: white; margin: 0; min-height: 100vh;
    }

    .topbar {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        padding: 12px 24px;
        display: flex; align-items: center;
        border-bottom: 1px solid var(--border-color);
        position: sticky; top: 0; z-index: 100;
    }
    .hamburger { font-size: 22px; cursor: pointer; margin-right: 20px; color: #22c55e; }

    .sidebar {
        position: fixed;
        top: 0; left: 0; width: 260px; height: 100%;
        background: var(--dark-green); color: white; padding: 30px 20px;
        transform: translateX(-100%);
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 1000; box-shadow: 10px 0 30px rgba(0,0,0,0.3);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar button {
        width: 100%;
        padding: 12px; margin-bottom: 10px;
        border: none; border-radius: 8px; cursor: pointer;
        background: transparent; color: white; text-align: left;
        font-weight: 500; transition: 0.2s;
    }
    .sidebar button:hover { background: rgba(255,255,255,0.1); }

    .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; }
    @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }

    .card { background: var(--card-bg); backdrop-filter: blur(12px); padding: 30px; border-radius: 24px; border: 1px solid var(--border-color); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    h2 { font-size: 1.25rem; margin-top: 0; margin-bottom: 25px; color: #22c55e; }
    label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; font-weight: 700; letter-spacing: 0.8px; }

    input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--input-bg); color: white; outline: none; box-sizing: border-box; transition: 0.2s; }
    input:focus { border-color: #22c55e; background: rgba(15, 23, 42, 1); }

    .btn { padding: 14px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s; }
    .primary-btn { background: #22c55e; color: #064e3b; box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2); }
    .primary-btn:hover { background: #16a34a; transform: translateY(-2px); }

    .med-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
    .med-item { background: var(--input-bg); padding: 18px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border-color); border-left: 4px solid #22c55e; }
    .med-info strong { display: block; font-size: 1rem; color: white; }
    .med-info span { font-size: 13px; color: var(--text-muted); }

    .delete-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 8px 14px; border-radius: 8px; font-size: 12px; border: 1px solid rgba(239, 68, 68, 0.2); cursor: pointer; }
    .delete-btn:hover { background: #ef4444; color: white; }

    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; z-index: 999; backdrop-filter: blur(4px); }
    .overlay.show { display: block; }
</style>
</head>
<body>

<div class="topbar">
  <span id="toggleSidebar" class="hamburger">☰</span>
  <strong style="color: #22c55e;">Health Assist Dashboard</strong>
</div>

<div id="sidebar" class="sidebar">
  <h3 style="margin-bottom: 30px; opacity: 0.9; font-weight: 700;">Menu</h3>
  <button onclick="window.location.href='/index'">🏠 Back to Chat</button>
  <hr style="opacity: 0.1; margin: 20px 0;">
  <button onclick="logout()" style="background:#ef4444; color:white; text-align: center; font-weight: 700;">Logout</button>
</div>

<div id="overlay" class="overlay"></div>

<div class="container">
  <div class="card">
    <h2>👤 Health Profile</h2>
    <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 25px; line-height: 1.5;">This data personalizes your local AI responses for maximum safety.</p>
    <label>KNOWN ALLERGIES</label>
    <input id="allergies" type="text" placeholder="e.g. Penicillin, Peanuts">
    <label>CHRONIC CONDITIONS</label>
    <input id="conditions" type="text" placeholder="e.g. Asthma, Diabetes">
    <label>USER AGE</label>
    <input id="age" type="number" placeholder="Enter your age">
    <button class="btn primary-btn" onclick="saveProfile()">Update Profile</button>
  </div>

  <div class="card">
    <h2>💊 Medication Management</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div>
            <label>MEDICINE NAME</label>
            <input id="name" type="text" placeholder="e.g. Paracetamol">
        </div>
        <div>
            <label>DOSAGE</label>
            <input id="dosage" type="text" placeholder="e.g. 500mg">
        </div>
    </div>
    <label>FREQUENCY</label>
    <input id="frequency" type="text" placeholder="e.g. Twice daily after food">
    <button class="btn primary-btn" onclick="addMedication()">+ Add Medication</button>
    <h2 style="margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 25px;">Active Medications</h2>
    <div id="medList" class="med-grid"></div>
  </div>
</div>

<script>
const token = localStorage.getItem("token");
if (!token || token === "null") { window.location.href = "/"; }

const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
document.getElementById("toggleSidebar").onclick = () => { sidebar.classList.add("open"); overlay.classList.add("show"); };
overlay.onclick = () => { sidebar.classList.remove("open"); overlay.classList.remove("show"); };
function logout(){ localStorage.clear(); window.location.href = "/"; }

async function saveProfile() {
    const allergies = document.getElementById("allergies").value;
    const conditions = document.getElementById("conditions").value;
    const age = document.getElementById("age").value;
    await fetch("http://127.0.0.1:8000/update-profile", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ allergies, conditions, age: age ? parseInt(age) : null })
    });
    alert("Profile saved successfully.");
}

async function loadProfile() {
    const res = await fetch("http://127.0.0.1:8000/profile", { headers: { "Authorization": "Bearer " + token }});
    if (res.ok) {
        const data = await res.json();
        document.getElementById("allergies").value = data.allergies || "";
        document.getElementById("conditions").value = data.conditions || "";
        document.getElementById("age").value = data.age || "";
    }
}

async function addMedication() {
    const name = document.getElementById("name").value;
    const dosage = document.getElementById("dosage").value;
    const frequency = document.getElementById("frequency").value;
    if (!name || !dosage) return;
    await fetch("http://127.0.0.1:8000/add-medication", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ name, dosage, frequency })
    });
    document.getElementById("name").value = "";
    document.getElementById("dosage").value = "";
    document.getElementById("frequency").value = "";
    loadMedications();
}

async function loadMedications() {
    const res = await fetch("http://127.0.0.1:8000/medications", { headers: { "Authorization": "Bearer " + token }});
    const data = await res.json();
    const list = document.getElementById("medList");
    list.innerHTML = data.medications.length === 0 ? "<p style='color:var(--text-muted); font-size: 14px;'>No medications logged.</p>" : "";
    data.medications.forEach(med => {
        list.innerHTML += `
            <div class="med-item">
                <div class="med-info">
                    <strong>${med.name}</strong>
                    <span>${med.dosage} • ${med.frequency}</span>
                </div>
                <button class="delete-btn" onclick="deleteMedication('${med.name}')">Remove</button>
            </div>`;
    });
}

async function deleteMedication(name) {
    await fetch(`http://127.0.0.1:8000/medication/${name}`, { method: "DELETE", headers: { "Authorization": "Bearer " + token }});
    loadMedications();
}

loadProfile();
loadMedications();
</script>
</body>
</html>
