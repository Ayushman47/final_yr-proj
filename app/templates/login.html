<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Health Assist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2e7d32;
            --dark-green: #1b5e20;
            --text-dark: #0f172a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #064e3b 0%, #1e293b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            color: var(--text-dark);
            padding: 45px 40px;
            border-radius: 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo strong {
            font-size: 1.8rem;
            color: var(--primary-green);
            letter-spacing: -0.5px;
        }

        h2 { 
            text-align: center; 
            margin-bottom: 30px; 
            font-weight: 700;
            font-size: 1.4rem;
        }

        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: var(--primary-green);
            background: white;
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border-radius: 14px;
            border: none;
            background: var(--primary-green);
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(46, 125, 50, 0.2);
        }
        button:hover {
            background: var(--dark-green);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.3);
        }

        .error { 
            color: #ef4444; 
            text-align: center; 
            margin-top: 15px; 
            font-size: 13px; 
            font-weight: 500;
            min-height: 20px;
        }
        
        .toggle { 
            text-align: center; 
            margin-top: 25px; 
            font-size: 14px;
            color: #64748b;
        }
        .toggle b { 
            color: var(--primary-green); 
            cursor: pointer; 
            transition: 0.2s;
        }
        .toggle b:hover { color: var(--dark-green); text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <strong>Health Assist</strong>
    </div>
    
    <h2 id="formTitle">Welcome Back</h2>

    <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter your username">
    </div>
    
    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button onclick="submitForm(false)">Login</button>
    <button id="adminLoginBtn" style="background: white; color: var(--primary-green); border: 2px solid var(--primary-green); margin-top: 10px;" onclick="submitForm(true)">Login as Admin</button>
    <div class="error" id="errorMsg"></div>

    <div class="toggle" id="toggleArea">
        Don't have an account? <b onclick="toggleMode()">Sign up</b>
    </div>
</div>

<script>
let isLogin = true;

function toggleMode() {
    isLogin = !isLogin;
    document.getElementById("formTitle").innerText = isLogin ? "Welcome Back" : "Create Account";
    document.querySelector("button").innerText = isLogin ? "Login" : "Create Account";
    document.getElementById("adminLoginBtn").style.display = isLogin ? "block" : "none";
    document.getElementById("toggleArea").innerHTML =
        isLogin ? 'Don\'t have an account? <b onclick="toggleMode()">Sign up</b>' :
                  'Already have an account? <b onclick="toggleMode()">Login</b>';
    document.getElementById("errorMsg").innerText = "";
}

async function submitForm(isAdminLogin) {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorMsg = document.getElementById("errorMsg");

    if (!username || !password) {
        errorMsg.innerText = "Please fill all fields.";
        return;
    }

    const endpoint = isLogin ? "login" : "signup";

    try {
        const response = await fetch(`/${endpoint}`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                username: username,
                password: password
            })
        });

        const data = await response.json();

        if (!response.ok) {
            errorMsg.innerText = data.detail || "Error occurred.";
            return;
        }

        if (isLogin) {
            localStorage.setItem("token", data.access_token);
            
            if (isAdminLogin) {
                const meRes = await fetch("/me", {
                    headers: { "Authorization": "Bearer " + data.access_token }
                });
                const meData = await meRes.json();
                if (!meData.is_admin) {
                    errorMsg.innerText = "Access denied. Not an admin.";
                    localStorage.removeItem("token");
                    return;
                }
            }
            
            window.location.replace(window.location.origin + "/index");
        } else {
            alert("Account created! Now login.");
            toggleMode();
        }

    } catch (err) {
        errorMsg.innerText = "Server not reachable.";
    }
}
</script>

</body>
</html>
