<!DOCTYPE html>
<html>
<head>
<title>Medical Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f4f6f9;}
.topbar{background:white;padding:15px 20px;display:flex;align-items:center;border-bottom:1px solid #ddd;}
.hamburger{font-size:20px;cursor:pointer;margin-right:15px;}

.sidebar{
position:fixed;top:0;left:0;width:260px;height:100%;
background:#1b5e20;color:white;padding:20px;
transform:translateX(-100%);
transition:0.3s ease;z-index:1000;
}
.sidebar.open{transform:translateX(0);}
.sidebar button{
width:100%;padding:8px;margin-bottom:8px;
border:none;border-radius:6px;cursor:pointer;
}

.overlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.3);display:none;z-index:999;
}
.overlay.show{display:block;}

.chat-container{
max-width:800px;margin:40px auto;background:white;
border-radius:16px;box-shadow:0 10px 25px rgba(0,0,0,0.15);
display:flex;flex-direction:column;height:70vh;
}

#chat{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;}
.message{margin-bottom:12px;padding:10px 14px;border-radius:12px;max-width:70%;}
.user{background:#2e7d32;color:white;align-self:flex-end;}
.bot{background:#eeeeee;align-self:flex-start;}

.input-area{display:flex;padding:15px;border-top:1px solid #ddd;}
#question{flex:1;padding:12px;border-radius:25px;border:1px solid #ccc;}
#sendBtn{margin-left:10px;padding:12px 20px;border-radius:25px;border:none;background:#2e7d32;color:white;cursor:pointer;}

/* Loading dots */
.dots::after {
  content: "";
  animation: dots 1.2s steps(3, end) infinite;
}
@keyframes dots {
  0% { content: ""; }
  33% { content: "."; }
  66% { content: ".."; }
  100% { content: "..."; }
}
</style>
</head>
<body>

<div class="topbar">
<span id="toggleSidebar" class="hamburger">☰</span>
<strong>💊 Medical Assistant</strong>
</div>

<div id="sidebar" class="sidebar">
<button id="profileBtn">👤 Profile</button>
<div id="profileMenu" style="display:none;">
<button id="medBtn">My Medications</button>
<button id="logoutBtn" style="background:#ef4444;color:white;">Logout</button>
</div>
<hr>
<button id="newChatBtn">+ New Chat</button>
<div id="conversationList"></div>
</div>

<div id="overlay" class="overlay"></div>

<div class="chat-container">
<div id="chat"></div>
<div class="input-area">
<input type="text" id="question" placeholder="Ask a medical question..."/>
<button id="sendBtn">Send</button>
</div>
</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

    const token = localStorage.getItem("token");

    if (!token || token === "undefined" || token === "null") {
        localStorage.removeItem("token");
        window.location.href = "/";
        return;
    }

    let currentConversationId = null;
    let conversationCreating = false;

    const chat = document.getElementById("chat");
    const input = document.getElementById("question");
    const sendBtn = document.getElementById("sendBtn");
    const newChatBtn = document.getElementById("newChatBtn");

    /* ===== SIDEBAR ===== */
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const toggleSidebar = document.getElementById("toggleSidebar");

    toggleSidebar.onclick = function(){
        sidebar.classList.add("open");
        overlay.classList.add("show");
    };

    overlay.onclick = function(){
        sidebar.classList.remove("open");
        overlay.classList.remove("show");
    };

    /* ===== PROFILE MENU ===== */
    const profileBtn = document.getElementById("profileBtn");
    const profileMenu = document.getElementById("profileMenu");
    const logoutBtn = document.getElementById("logoutBtn");
    const medBtn = document.getElementById("medBtn");

    profileBtn.onclick = function(){
        if(profileMenu.style.display === "none" || profileMenu.style.display === ""){
            profileMenu.style.display = "block";
        } else {
            profileMenu.style.display = "none";
        }
    };

    logoutBtn.onclick = function(){
        localStorage.removeItem("token");
        window.location.href = "/";
    };

    medBtn.onclick = function(){
        window.location.href = "/notes";
    };

    /* ===== CREATE CONVERSATION ===== */
    async function createConversation(){

        if (conversationCreating) return;
        conversationCreating = true;

        try {
            const res = await fetch("/conversations",{
                method:"POST",
                headers:{ "Authorization":"Bearer "+token }
            });

            if (res.status === 401) {
                localStorage.removeItem("token");
                window.location.href = "/";
                return;
            }

            const data = await res.json();
            currentConversationId = data.conversation_id;

        } catch (err) {
            console.error("Conversation error:", err);
        } finally {
            conversationCreating = false;
        }
    }

    /* ===== ASK QUESTION ===== */
    async function askQuestion(){

        if(!currentConversationId) return;

        const question = input.value.trim();
        if(!question) return;

        addMessage(question,"user");
        input.value="";

        const loadingDiv = document.createElement("div");
        loadingDiv.classList.add("message","bot");
        loadingDiv.innerHTML = "Typing<span class='dots'></span>";
        chat.appendChild(loadingDiv);
        chat.scrollTop = chat.scrollHeight;

        try {
            const res = await fetch("/ask",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Authorization":"Bearer "+token
                },
                body:JSON.stringify({
                    question:question,
                    conversation_id:currentConversationId
                })
            });

            const data = await res.json();
            chat.removeChild(loadingDiv);
            addMessage(data.answer,"bot");

        } catch (err) {
            chat.removeChild(loadingDiv);
            console.error("Ask error:", err);
        }
    }

    function addMessage(text,type){
        const div=document.createElement("div");
        div.classList.add("message",type);
        div.textContent=text;
        chat.appendChild(div);
        chat.scrollTop=chat.scrollHeight;
    }

    /* ===== NEW CHAT ===== */
    newChatBtn.onclick = async function(){

        if (conversationCreating) return;

        chat.innerHTML = "";
        currentConversationId = null;

        await createConversation();
    };

    createConversation();

    sendBtn.onclick = askQuestion;
    input.addEventListener("keypress",function(e){
        if(e.key==="Enter") askQuestion();
    });

});
</script>

</body>
</html>
