<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Assist | AI Medical Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2e7d32;
            --dark-green: #1b5e20;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: rgba(226, 232, 240, 0.3);
            --user-bubble: #2e7d32;
            --bot-bubble: rgba(241, 245, 249, 0.8);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .hamburger { font-size: 24px; cursor: pointer; margin-right: 20px; color: var(--primary-green); }

        .sidebar {
            position: fixed;
            top: 0; left: 0; width: 280px; height: 100%;
            background: var(--dark-green);
            color: white; padding: 30px 20px;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar h2 { margin-top: 0; font-weight: 700; color: #a5d6a7; }
        .sidebar button {
            width: 100%;
            padding: 12px; margin-bottom: 12px;
            border: none; border-radius: 10px; cursor: pointer;
            background: rgba(255,255,255,0.1); color: white;
            text-align: left; font-weight: 500; transition: 0.2s;
        }
        .sidebar button:hover { background: rgba(255,255,255,0.2); }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.2); display: none; z-index: 999;
            backdrop-filter: blur(4px);
        }
        .overlay.show { display: block; }

        .main-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .chat-container {
            width: 100%;
            max-width: 850px;
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(15px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
            height: 80vh;
            border: 1px solid rgba(255, 255, 255, 0.4);
            overflow: hidden;
        }

        #chat { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        
        .message { 
            padding: 12px 18px;
            border-radius: 18px; 
            font-size: 15px; 
            max-width: 75%; 
            word-wrap: break-word; 
            white-space: pre-wrap; 
            line-height: 1.5;
        }
        
        .user { background: var(--user-bubble); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bot { background: var(--bot-bubble); color: var(--text-dark); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.5); }

        .input-area { display: flex; padding: 20px; background: rgba(255, 255, 255, 0.4); border-top: 1px solid var(--border-color); }
        #question { flex: 1; padding: 14px 22px; border-radius: 30px; border: 1px solid rgba(0,0,0,0.1); outline: none; background: rgba(255,255,255,0.7); }
        #sendBtn { margin-left: 12px; padding: 0 28px; border-radius: 30px; border: none; background: var(--primary-green); color: white; font-weight: 600; cursor: pointer; }
        #sendBtn:disabled { background: #94a3b8; cursor: not-allowed; }

        .emergency-banner { background: #fee2e2; color: #991b1b; padding: 12px; display: none; text-align: center; font-weight: 700; border-bottom: 1px solid #fecaca; }
        .disclaimer-area { padding: 12px; text-align: center; font-size: 11px; color: var(--text-muted); background: rgba(255,255,255,0.2); }
        
        .dots::after { content: ""; animation: dots 1.2s steps(3, end) infinite; }
        @keyframes dots { 0% { content: ""; } 33% { content: "."; } 66% { content: ".."; } 100% { content: "..."; } }
    </style>
</head>
<body>

<div class="topbar">
    <span id="toggleSidebar" class="hamburger">☰</span>
    <strong style="color: #2e7d32; font-size: 1.2rem;">Health Assist</strong>
</div>

<div id="sidebar" class="sidebar">
    <h2>Menu</h2>
    <button id="profileBtn">👤 My Health Profile</button>
    <div id="profileMenu" style="display:none; padding-left: 15px; margin-bottom: 10px;">
        <button id="medBtn">📋 Medications</button>
        <button id="logoutBtn" style="background: #ef4444; color: white;">Logout</button>
    </div>
    <hr style="opacity: 0.1; margin: 15px 0;">
    <button id="newChatBtn" style="background: rgba(255,255,255,0.15);">+ New Conversation</button>
</div>

<div id="overlay" class="overlay"></div>

<div class="main-wrapper">
    <div class="chat-container">
        <div id="emergencyBanner" class="emergency-banner">
            ⚠️ EMERGENCY ALERT: Call 112 or visit the nearest hospital immediately.
        </div>
        <div id="chat">
            <div class="message bot">Welcome to <strong>Health Assist</strong>. I can provide suggestions for minor symptoms. How can I help today?</div>
        </div>
        <div class="input-area">
            <input type="text" id="question" placeholder="Describe your symptoms..." autocomplete="off"/>
            <button id="sendBtn">Send</button>
        </div>
        <div class="disclaimer-area">
            <strong>MEDICAL DISCLAIMER:</strong> Evidence-based suggestions only. Not a substitute for professional medical advice.
        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const token = localStorage.getItem("token");
    if (!token || token === "null" || token === "undefined") {
        window.location.href = "/";
        return;
    }

    let currentConversationId = localStorage.getItem("conversation_id");
    let isProcessing = false;

    const chat = document.getElementById("chat");
    const input = document.getElementById("question");
    const sendBtn = document.getElementById("sendBtn");
    const emergencyBanner = document.getElementById("emergencyBanner");

    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    
    document.getElementById("toggleSidebar").onclick = () => { sidebar.classList.add("open"); overlay.classList.add("show"); };
    overlay.onclick = () => { sidebar.classList.remove("open"); overlay.classList.remove("show"); };
    
    document.getElementById("profileBtn").onclick = () => {
        const menu = document.getElementById("profileMenu");
        menu.style.display = menu.style.display === "block" ? "none" : "block";
    };
    document.getElementById("logoutBtn").onclick = () => {
        localStorage.clear();
        window.location.href = "/";
    };
    document.getElementById("medBtn").onclick = () => window.location.href = "/notes";

    async function apiRequest(url, method = "GET", body = null) {
        const headers = { "Authorization": `Bearer ${token}` };
        if (body) headers["Content-Type"] = "application/json";
        try {
            const res = await fetch(url, { method, headers, body: body ? JSON.stringify(body) : null });
            if (res.status === 401) {
                localStorage.clear();
                window.location.href = "/";
                return null;
            }
            return await res.json();
        } catch (err) { return null; }
    }

    function addMessage(text, type) {
        const div = document.createElement("div");
        div.className = `message ${type}`;
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    async function ensureConversation() {
        if (!currentConversationId || currentConversationId === "null") {
            const data = await apiRequest("/conversations", "POST");
            if (data && data.conversation_id) {
                currentConversationId = data.conversation_id;
                localStorage.setItem("conversation_id", currentConversationId);
            }
        }
        return currentConversationId;
    }

    async function loadHistory() {
        if (!currentConversationId) return;
        const data = await apiRequest(`/messages/${currentConversationId}`);
        if (data && data.messages) {
            chat.innerHTML = "";
            data.messages.forEach(msg => addMessage(msg.content, msg.sender));
        }
    }

    async function askQuestion() {
        const text = input.value.trim();
        if (!text || isProcessing) return;

        isProcessing = true;
        sendBtn.disabled = true;

        await ensureConversation();
        const keywords = ["emergency", "heart attack", "chest pain", "heavy bleeding", "stroke"];
        if (keywords.some(k => text.toLowerCase().includes(k))) {
            emergencyBanner.style.display = "block";
        }

        addMessage(text, "user");
        input.value = "";

        const loading = document.createElement("div");
        loading.className = "message bot";
        loading.innerHTML = "Consulting knowledge base<span class='dots'></span>";
        chat.appendChild(loading);
        chat.scrollTop = chat.scrollHeight;

        const response = await apiRequest("/ask", "POST", {
            question: text,
            conversation_id: parseInt(currentConversationId)
        });
        chat.removeChild(loading);
        isProcessing = false;
        sendBtn.disabled = false;

        if (response && response.answer) {
            if (response.answer.includes("EMERGENCY")) emergencyBanner.style.display = "block";
            addMessage(response.answer, "bot");
        } else {
            addMessage("⚠️ Error: AI server is busy or offline.", "bot");
        }
    }

    document.getElementById("newChatBtn").onclick = async () => {
        chat.innerHTML = "";
        localStorage.removeItem("conversation_id");
        currentConversationId = null;
        await ensureConversation();
        addMessage("Started a new session. How can I help?", "bot");
        sidebar.classList.remove("open");
        overlay.classList.remove("show");
    };

    if (currentConversationId) { loadHistory(); } else { ensureConversation(); }

    sendBtn.onclick = askQuestion;
    input.onkeypress = (e) => { if(e.key === "Enter") askQuestion(); };
});
</script>
</body>
</html>
