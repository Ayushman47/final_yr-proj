<!DOCTYPE html>
<html>
<head>
    <title>Medical AI Assistant</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .navbar {
            background: #4CAF50;
            padding: 12px;
            color: white;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
        }

        .chat-container {
            width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            padding: 20px;
        }

        .message {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
        }

        .user { background: #DCF8C6; }
        .bot { background: #F1F0F0; }

        input {
            width: 80%;
            padding: 10px;
        }

        button {
            padding: 10px;
            background: #4CAF50;
            border: none;
            color: white;
            cursor: pointer;
        }

        .spinner {
            width: 14px;
            height: 14px;
            border: 3px solid #ccc;
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="navbar">
    <div>Medical RAG Assistant</div>
    <div>
        <a href="index.html">Chat</a>
        <a href="notes.html">My Medications</a>
    </div>
</div>

<div class="chat-container">
    <div id="chat"></div>

    <input type="text" id="question" placeholder="Ask something..."
           onkeypress="if(event.key==='Enter') askQuestion()">
    <button onclick="askQuestion()">Send</button>
</div>

<script>
async function askQuestion() {
    const input = document.getElementById("question");
    const chat = document.getElementById("chat");
    const question = input.value.trim();
    if (!question) return;

    chat.innerHTML += `<div class="message user">${question}</div>`;
    chat.innerHTML += `<div class="message bot"><span class="spinner"></span> Generating...</div>`;
    input.value = "";

    const response = await fetch("http://127.0.0.1:8000/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ question })
    });

    const data = await response.json();

    chat.lastChild.remove();
    chat.innerHTML += `<div class="message bot">${data.answer}</div>`;
}
</script>

</body>
</html>
