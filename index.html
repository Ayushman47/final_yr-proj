<!DOCTYPE html>
<html>
<head>
    <title>Medical RAG Assistant</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 600px;
            height: 80vh;
            background: white;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .chat-header {
            background: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 80%;
            line-height: 1.4;
        }

        .user {
            background: #DCF8C6;
            align-self: flex-end;
        }

        .bot {
            background: #F1F0F0;
            align-self: flex-start;
        }

        .chat-input {
            display: flex;
            border-top: 1px solid #ddd;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border: none;
            font-size: 14px;
        }

        .chat-input button {
            padding: 12px 18px;
            border: none;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        .chat-input button:hover {
            background: #45a049;
        }

        .typing {
            font-style: italic;
            color: gray;
        }

        /* Spinner */
        .spinner {
            width: 16px;
            height: 16px;
            border: 3px solid #ccc;
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 6px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        Medical RAG Assistant
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="chat-input">
        <input type="text" id="question" placeholder="Ask your question..." onkeypress="if(event.key==='Enter') askQuestion()" />
        <button onclick="askQuestion()">Send</button>
    </div>
</div>

<script>
async function askQuestion() {
    const input = document.getElementById("question");
    const chat = document.getElementById("chatMessages");
    const question = input.value.trim();

    if (!question) return;

    // Add user message
    const userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.innerText = question;
    chat.appendChild(userMsg);

    input.value = "";
    chat.scrollTop = chat.scrollHeight;

    // Add loading message
    const loadingMsg = document.createElement("div");
    loadingMsg.className = "message bot typing";
    loadingMsg.innerHTML = "<span class='spinner'></span>Generating response...";
    chat.appendChild(loadingMsg);
    chat.scrollTop = chat.scrollHeight;

    try {
        const response = await fetch("http://127.0.0.1:8000/ask", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ question: question })
        });

        const data = await response.json();

        // Remove loading
        chat.removeChild(loadingMsg);

        // Add bot response
        const botMsg = document.createElement("div");
        botMsg.className = "message bot";
        botMsg.innerText = data.answer;
        chat.appendChild(botMsg);

        chat.scrollTop = chat.scrollHeight;

    } catch (error) {
        chat.removeChild(loadingMsg);

        const errorMsg = document.createElement("div");
        errorMsg.className = "message bot";
        errorMsg.innerText = "Error connecting to backend.";
        chat.appendChild(errorMsg);
    }
}
</script>

</body>
</html>
