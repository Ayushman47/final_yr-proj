<!DOCTYPE html>
<html>
<head>
    <title>Medical Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
        }

        /* ===== TOP BAR ===== */
        .topbar {
            background: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #ddd;
        }

        .hamburger {
            font-size: 20px;
            cursor: pointer;
            margin-right: 15px;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100%;
            background: #1b5e20;
            color: white;
            padding: 25px 20px;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .profile-btn {
            background: white;
            color: #1b5e20;
            font-weight: bold;
        }

        .submenu {
            display: none;
            margin-top: 5px;
        }

        .submenu button {
            background: #2e7d32;
            color: white;
        }

        .logout-btn {
            background: #ef4444 !important;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 999;
        }

        .overlay.show {
            display: block;
        }

        /* ===== CHAT ===== */
        .chat-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            height: 70vh;
        }

        #chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            max-width: 70%;
        }

        .user {
            background: #2e7d32;
            color: white;
            align-self: flex-end;
        }

        .bot {
            background: #eeeeee;
            color: black;
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #ddd;
        }

        #question {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #ccc;
        }

        #sendBtn {
            margin-left: 10px;
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            background: #2e7d32;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <span id="toggleSidebar" class="hamburger">☰</span>
    <strong>💊 Medical Assistant</strong>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <button id="profileBtn" class="profile-btn">👤 Profile</button>

    <div id="submenu" class="submenu">
        <button id="medBtn">My Medications</button>
        <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>
</div>

<div id="overlay" class="overlay"></div>

<!-- CHAT -->
<div class="chat-container">
    <div id="chat"></div>

    <div class="input-area">
        <input type="text" id="question" placeholder="Ask a medical question..." />
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const toggleSidebar = document.getElementById("toggleSidebar");

    const profileBtn = document.getElementById("profileBtn");
    const submenu = document.getElementById("submenu");
    const medBtn = document.getElementById("medBtn");
    const logoutBtn = document.getElementById("logoutBtn");

    const input = document.getElementById("question");
    const chat = document.getElementById("chat");
    const sendBtn = document.getElementById("sendBtn");

    const token = localStorage.getItem("token");
    if (!token) {
        window.location.replace("login.html");
        return;
    }

    // Sidebar open
    toggleSidebar.addEventListener("click", function () {
        sidebar.classList.add("open");
        overlay.classList.add("show");
    });

    // Sidebar close
    overlay.addEventListener("click", function () {
        sidebar.classList.remove("open");
        overlay.classList.remove("show");
    });

    // Profile dropdown toggle
    profileBtn.addEventListener("click", function () {
        submenu.style.display =
            submenu.style.display === "block" ? "none" : "block";
    });

    // My Medications
    medBtn.addEventListener("click", function () {
        window.location.href = "notes.html";
    });

    // Logout
    logoutBtn.addEventListener("click", function () {
        localStorage.removeItem("token");
        localStorage.removeItem("chatHistory");
        window.location.href = "login.html";
    });

    // Chat logic
    function addMessage(text, type) {
        const div = document.createElement("div");
        div.classList.add("message", type);
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    async function askQuestion() {
        const question = input.value.trim();
        if (!question) return;

        addMessage(question, "user");
        input.value = "";

        const loading = document.createElement("div");
        loading.classList.add("message", "bot");
        loading.innerText = "...";
        chat.appendChild(loading);

        try {
            const response = await fetch("http://127.0.0.1:8000/ask", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ question })
            });

            const data = await response.json();
            chat.removeChild(loading);
            addMessage(data.answer, "bot");

        } catch {
            chat.removeChild(loading);
            addMessage("Server error.", "bot");
        }
    }

    sendBtn.addEventListener("click", askQuestion);

    input.addEventListener("keypress", function (e) {
        if (e.key === "Enter") askQuestion();
    });

});
</script>

</body>
</html>
