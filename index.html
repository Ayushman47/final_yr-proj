<!DOCTYPE html>
<html>
<head>
    <title>Medical AI Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #f4f6f9);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .navbar {
            background: #2e7d32;
            padding: 15px 25px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        .chat-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 750px;
            height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            font-weight: 600;
            font-size: 16px;
            color: #555;
        }

        #chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 75%;
            padding: 14px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 14px;
            animation: fadeIn 0.3s ease-in-out;
        }

        .user {
            align-self: flex-end;
            background: #2e7d32;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .bot {
            align-self: flex-start;
            background: #f1f1f1;
            color: #333;
            border-bottom-left-radius: 5px;
        }

        .input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #eee;
            background: #fafafa;
        }

        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 30px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 14px;
        }

        .input-area input:focus {
            border-color: #2e7d32;
        }

        .input-area button {
            margin-left: 10px;
            padding: 12px 20px;
            border-radius: 30px;
            border: none;
            background: #2e7d32;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .input-area button:hover {
            background: #1b5e20;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 3px solid #ccc;
            border-top: 3px solid #2e7d32;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar styling */
        #chat::-webkit-scrollbar {
            width: 6px;
        }

        #chat::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div><b>Medical RAG Assistant</b></div>
    <div>
        <a href="index.html">Chat</a>
        <a href="notes.html">My Medications</a>
    </div>
</div>

<div class="chat-wrapper">
    <div class="chat-container">

        <div class="chat-header">
            Ask medical questions based on indexed documents
        </div>

        <div id="chat"></div>

        <div class="input-area">
            <input type="text" id="question" placeholder="Type your question..."
                   onkeypress="if(event.key==='Enter') askQuestion()">
            <button onclick="askQuestion()">Send</button>
        </div>

    </div>
</div>

<script>
async function askQuestion() {
    const input = document.getElementById("question");
    const chat = document.getElementById("chat");
    const question = input.value.trim();
    if (!question) return;

    chat.innerHTML += `<div class="message user">${question}</div>`;
    chat.innerHTML += `<div class="message bot"><span class="spinner"></span> Generating...</div>`;
    chat.scrollTop = chat.scrollHeight;
    input.value = "";

    const response = await fetch("http://127.0.0.1:8000/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ question })
    });

    const data = await response.json();

    chat.lastChild.remove();
    chat.innerHTML += `<div class="message bot">${data.answer}</div>`;
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
